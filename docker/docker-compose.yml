# docker/docker-compose.yml
# ==========================
# Brings up the full BS4 Analytics stack locally:
#   api  → http://localhost:8000  (FastAPI + Swagger UI at /docs)
#   app  → http://localhost:8501  (Streamlit dashboard)
#
# Usage: docker-compose -f docker/docker-compose.yml up --build

version: "3.9"

services:

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: bs4-api
    ports:
      - "8000:8000"
    volumes:
      # Persist pipeline outputs across container restarts
      - ../data:/app/data
      - ../output:/app/output
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    container_name: bs4-app
    ports:
      - "8501:8501"
    environment:
      # Point Streamlit at the API service (uses Docker internal hostname)
      - API_BASE_URL=http://api:8000
    env_file:
      - ../.env
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  data:
  output:
